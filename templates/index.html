<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlightScout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* Glassmorphism Classes */
        .glass-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        .dark .glass-panel {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        
        .main-bg {
            background-color: #f3f4f6;
            background-image: radial-gradient(at 0% 0%, hsla(253,16%,14%,0.15) 0, transparent 50%), radial-gradient(at 50% 0%, hsla(225,39%,50%,0.15) 0, transparent 50%), radial-gradient(at 100% 0%, hsla(339,49%,50%,0.15) 0, transparent 50%);
            background-attachment: fixed;
        }
        .dark .main-bg {
            background-color: #0f172a;
            background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), radial-gradient(at 50% 0%, hsla(225,39%,15%,1) 0, transparent 50%), radial-gradient(at 100% 0%, hsla(339,49%,15%,1) 0, transparent 50%);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
    </style>
</head>

<body class="main-bg text-gray-900 dark:text-gray-100 min-h-screen transition-colors duration-300">

  <div class="max-w-6xl mx-auto px-4 py-8 md:py-12">
    <!-- Header Area -->
    <div class="flex justify-between items-center mb-8 md:mb-10">
      <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight">✈️ FlightScout</h1>
      <button onclick="toggleDarkMode()" 
        class="glass-panel p-2.5 rounded-full hover:scale-105 transition-transform duration-200" aria-label="Toggle Dark Mode">
        <svg id="themeIcon" class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
            <!-- Icon changed via JS -->
            <path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" fill-rule="evenodd" clip-rule="evenodd"></path>
        </svg>
      </button>
    </div>

    <!-- Search Section -->
    <div class="glass-panel rounded-3xl p-6 md:p-8 mb-10 mx-auto max-w-5xl relative z-10 text-center">
      <h2 class="text-xl md:text-2xl font-bold mb-6">Find Your Next Adventure</h2>
      
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-3 mb-5">
        <!-- Trip Type -->
        <select id="tripType" onchange="toggleReturnDate()" class="px-4 py-3 rounded-xl bg-white/50 dark:bg-gray-800/50 backdrop-blur-md border border-white/50 dark:border-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors shadow-sm font-semibold text-gray-800 dark:text-gray-200">
            <option value="round" class="text-gray-900">Round Trip</option>
            <option value="oneway" class="text-gray-900">One Way</option>
        </select>

        <!-- Origin -->
        <input 
          id="originInput"
          type="text"
          value="LON"
          placeholder="Origin (e.g. LON)"
          class="px-4 py-3 rounded-xl bg-white/50 dark:bg-gray-800/50 backdrop-blur-md border border-white/50 dark:border-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors shadow-sm font-semibold uppercase"
        />

        <!-- Destination -->
        <input 
          id="cityInput"
          type="text"
          placeholder="Destination (e.g. PAR)"
          class="px-4 py-3 rounded-xl bg-white/50 dark:bg-gray-800/50 backdrop-blur-md border border-white/50 dark:border-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors shadow-sm font-semibold uppercase"
          onkeypress="if(event.key === 'Enter') searchFlights()"
        />

        <!-- Departure Date -->
        <input 
          id="depDate"
          type="date"
          class="px-4 py-3 rounded-xl bg-white/50 dark:bg-gray-800/50 backdrop-blur-md border border-white/50 dark:border-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors shadow-sm font-semibold text-gray-700 dark:text-gray-200"
        />

        <!-- Return Date -->
        <input 
          id="retDate"
          type="date"
          class="px-4 py-3 rounded-xl bg-white/50 dark:bg-gray-800/50 backdrop-blur-md border border-white/50 dark:border-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors shadow-sm font-semibold text-gray-700 dark:text-gray-200"
        />
      </div>

      <div class="flex justify-center gap-4">
        <button 
          onclick="searchFlights()"
          class="bg-blue-600 hover:bg-blue-700 text-white px-10 py-3.5 rounded-xl font-bold transition-colors duration-200 shadow-lg"
        >
          Search Flights
        </button>
      </div>

      <div class="mt-6 flex flex-wrap justify-center gap-3 items-center text-sm font-medium">
        <span class="text-gray-600 dark:text-gray-400">Recent:</span>
        <div id="recentSearches" class="flex flex-wrap gap-2"></div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6 max-w-5xl mx-auto px-1">
        <h3 class="text-xl font-bold tracking-tight" id="resultsTitle">Featured Deals</h3>
        <div class="flex flex-wrap justify-center gap-3">
            <select id="priceSort" onchange="sortData()" class="text-sm font-semibold glass-panel px-4 py-2 rounded-lg cursor-pointer focus:outline-none hover:bg-white/20 dark:hover:bg-gray-700/50 transition-colors">
                <option value="" class="text-gray-900">Sort: Recommended</option>
                <option value="asc" class="text-gray-900">Price: Low to High</option>
                <option value="desc" class="text-gray-900">Price: High to Low</option>
            </select>
            <button onclick="toggleView()" 
                class="text-sm font-semibold glass-panel px-4 py-2 rounded-lg hover:bg-white/40 dark:hover:bg-gray-700/50 transition-colors duration-200"
                id="switchViewBtn">
                Switch to Table View
            </button>
        </div>
    </div>

    <!-- Results Section -->
    <div id="results" class="grid gap-6 md:grid-cols-2 lg:grid-cols-3 max-w-5xl mx-auto">
      <!-- Cards / Table appended here -->
    </div>

  </div>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
